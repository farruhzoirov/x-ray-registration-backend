name: Deploy X-ray registration to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: SSH to Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # NVM ni yoqish (node, npm, pm2 ishlashi uchun)
            export NVM_DIR="/root/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Agar pm2 o‘rnatilmagan bo‘lsa → global qilib o‘rnatamiz
            if ! command -v pm2 &> /dev/null
            then
              npm install -g pm2
            fi

            # Puppeteer (Chrome) uchun kerakli system paketlarni o'rnatish (faqat birinchi marta)
            if ! dpkg -s libnspr4 >/dev/null 2>&1; then
              apt-get install -y \
                libnspr4 \
                libnss3 \
                libatk1.0-0t64 \
                libatk-bridge2.0-0t64 \
                libcups2t64 \
                libdrm2 \
                libxkbcommon0 \
                libxcomposite1 \
                libxdamage1 \
                libxfixes3 \
                libxrandr2 \
                libgbm1 \
                libasound2t64 \
                libpango-1.0-0 \
                libpangocairo-1.0-0 \
                libgtk-3-0t64 \
                libx11-xcb1 \
                libxcb-dri3-0 || true
            fi

            cd /home/${{ secrets.SERVER_USER }}

            if [ ! -d "x-ray-registration-backend" ]; then
              git clone https://github.com/farruhzoirov/x-ray-registration-backend.git
            fi

            cd x-ray-registration-backend
            git reset --hard HEAD
            git pull origin main

            PACKAGE_HASH=$(md5sum package.json | awk '{print $1}')
            SAVED_HASH=$(cat .npm_install_hash 2>/dev/null || echo "")
            if [ "$PACKAGE_HASH" != "$SAVED_HASH" ] || [ ! -d "node_modules" ]; then
              npm install --force
              echo "$PACKAGE_HASH" > .npm_install_hash
            fi
            npm run build

            cat > .env <<EOL
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            LOGIN=${{ secrets.LOGIN }}
            PASSWORD=${{ secrets.PASSWORD }}
            ADMIN_1_ID=${{ secrets.ADMIN_1_ID }}
            ADMIN_2_ID=${{ secrets.ADMIN_2_ID }}
            USER_ID=${{ secrets.USER_ID }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            EOL

            pm2 start dist/main.js --name x-ray || pm2 restart x-ray
            pm2 save
